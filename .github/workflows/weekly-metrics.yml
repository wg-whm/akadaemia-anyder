name: Weekly Metrics

on:
  schedule:
    # Run every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0  # Full history for git log analysis

      - name: Analyze rework rate
        id: rework
        run: |
          TOTAL=$(git log --oneline --since="7 days ago" | wc -l)
          REWORK=$(git log --oneline --since="7 days ago" | grep -iE "fix|typo|oops|revert|actually|broken|crash" | wc -l)
          if [ "$TOTAL" -gt 0 ]; then
            RATE=$(echo "scale=1; $REWORK * 100 / $TOTAL" | bc)
          else
            RATE=0
          fi
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "rework=$REWORK" >> $GITHUB_OUTPUT
          echo "rate=$RATE" >> $GITHUB_OUTPUT

      - name: Generate report
        run: |
          mkdir -p logs/reports
          DATE=$(date +%Y-%m-%d)
          cat > logs/reports/weekly-$DATE.md << EOF
          # Weekly Metrics Report - $DATE

          ## Rework Rate (Last 7 Days)

          | Metric | Value |
          |--------|-------|
          | Total commits | ${{ steps.rework.outputs.total }} |
          | Rework commits | ${{ steps.rework.outputs.rework }} |
          | Rework rate | ${{ steps.rework.outputs.rate }}% |

          ## Trend

          Check previous reports in \`logs/reports/\` to track improvement.

          ## Context

          Rework commits are those containing keywords like "fix", "typo", "crash", etc.
          Lower rework rates indicate better initial code quality and testing practices.

          For a game plugin with unsafe memory operations, target <20% is good, <10% is excellent.

          ---
          Generated by GitHub Actions
          EOF

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/reports/
          git diff --staged --quiet || git commit -m "docs: weekly metrics report $(date +%Y-%m-%d)"
          git push
